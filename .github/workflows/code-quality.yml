name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Static analysis and linting
  lint-and-format:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Run ESLint with detailed output
        working-directory: ./frontend
        run: |
          pnpm run lint --format=json --output-file=eslint-report.json || true
          pnpm run lint

      - name: Check for formatting issues
        working-directory: ./frontend
        run: |
          # Install prettier if not already available
          if ! command -v prettier &> /dev/null; then
            pnpm add -D prettier
          fi
          
          # Check if code is properly formatted
          npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css,md}" || {
            echo "Code formatting issues found. Run 'prettier --write' to fix them."
            exit 1
          }

      - name: Upload ESLint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-report
          path: frontend/eslint-report.json
          retention-days: 30

  # TypeScript type checking (if applicable)
  type-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        working-directory: ./frontend
        run: |
          if [ -f tsconfig.json ]; then
            echo "Running TypeScript type check..."
            npx tsc --noEmit --pretty
          else
            echo "No TypeScript configuration found, adding basic JSDoc checking..."
            # Use ESLint for JSDoc validation
            npx eslint --ext .js,.jsx src/ --rule '{
              "valid-jsdoc": "error",
              "require-jsdoc": ["error", {
                "require": {
                  "FunctionDeclaration": true,
                  "MethodDefinition": true,
                  "ClassDeclaration": true,
                  "ArrowFunctionExpression": true,
                  "FunctionExpression": true
                }
              }]
            }' || echo "JSDoc validation completed with warnings"
          fi

  # Dependency vulnerability scanning
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend security audit
        working-directory: ./frontend
        run: |
          echo "Running frontend security audit..."
          pnpm audit --audit-level moderate || {
            echo "⚠️  Security vulnerabilities found in frontend dependencies"
            pnpm audit --audit-level moderate --json > audit-report.json || true
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Backend security audit
        working-directory: ./backend
        run: |
          echo "Running backend security audit..."
          pip install safety
          pip install -r requirements.txt
          safety check || {
            echo "⚠️  Security vulnerabilities found in backend dependencies"
            safety check --json > safety-report.json || true
          }

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            frontend/audit-report.json
            backend/safety-report.json
          retention-days: 30

  # Code complexity analysis
  complexity-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install analysis tools
        run: |
          npm install -g complexity-report jscpd

      - name: Run complexity analysis
        working-directory: ./frontend/src
        run: |
          echo "Running complexity analysis..."
          complexity-report --format json --output ../complexity-report.json . || true
          
          echo "Running duplicate code detection..."
          jscpd --format json --output ../jscpd-report.json . || true

      - name: Upload complexity reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: complexity-reports
          path: |
            frontend/complexity-report.json
            frontend/jscpd-report.json
          retention-days: 30

  # Bundle size analysis
  bundle-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build and analyze bundle
        working-directory: ./frontend
        run: |
          echo "Building production bundle..."
          pnpm run build
          
          echo "Analyzing bundle size..."
          npm install -g bundlesize
          
          # Create bundlesize config if it doesn't exist
          cat > bundlesize.config.js << EOF
          module.exports = [
            {
              "path": "./dist/**/*.js",
              "maxSize": "500kb"
            },
            {
              "path": "./dist/**/*.css",
              "maxSize": "50kb"
            }
          ];
          EOF
          
          bundlesize || echo "Bundle size check completed with warnings"

      - name: Upload build artifacts for analysis
        uses: actions/upload-artifact@v4
        with:
          name: build-analysis
          path: |
            frontend/dist/
            frontend/bundlesize.config.js
          retention-days: 7