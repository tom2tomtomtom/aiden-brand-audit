name: Performance Monitoring

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run performance tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # Lighthouse performance audit
  lighthouse-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build application
        working-directory: ./frontend
        run: pnpm run build

      - name: Start application
        working-directory: ./frontend
        run: |
          pnpm run preview &
          sleep 10
        env:
          PORT: 4173

      - name: Run Lighthouse audit
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: './frontend/lighthouse.config.js'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Store Lighthouse results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  # Bundle size monitoring
  bundle-size-monitoring:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build and analyze bundle
        working-directory: ./frontend
        run: |
          pnpm run build
          
          # Install bundle analyzer
          npm install -g webpack-bundle-analyzer
          
          # Generate bundle report
          npx vite-bundle-analyzer dist/

      - name: Check bundle size regression
        working-directory: ./frontend
        run: |
          # Create a simple bundle size check
          TOTAL_SIZE=$(du -sk dist/ | cut -f1)
          echo "Total bundle size: ${TOTAL_SIZE}KB"
          
          # Fail if bundle exceeds 2MB (2048KB)
          if [ $TOTAL_SIZE -gt 2048 ]; then
            echo "❌ Bundle size exceeds 2MB limit"
            exit 1
          else
            echo "✅ Bundle size within acceptable limits"
          fi

      - name: Store bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: |
            frontend/dist/
            frontend/bundle-report.html
          retention-days: 30

  # API performance testing
  api-performance:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install locust

      - name: Start backend
        working-directory: ./backend
        run: |
          export FLASK_ENV=development
          nohup python src/main.py &
          sleep 15

      - name: Run API performance tests
        working-directory: ./backend
        run: |
          # Create a simple Locust performance test
          cat > performance_test.py << 'EOF'
          from locust import HttpUser, task, between
          import json

          class BrandAuditUser(HttpUser):
              wait_time = between(1, 3)
              
              @task(3)
              def health_check(self):
                  self.client.get("/health")
              
              @task(1)
              def brand_audit_request(self):
                  payload = {
                      "url": "https://example.com",
                      "brand_name": "Example Brand"
                  }
                  self.client.post("/api/brand-audit", 
                                 json=payload,
                                 headers={"Content-Type": "application/json"})
          EOF
          
          # Run performance test
          locust -f performance_test.py --headless -u 10 -r 2 -t 30s --host=http://localhost:5000 --html=performance-report.html

      - name: Store performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-performance-results
          path: |
            backend/performance-report.html
          retention-days: 30

  # Visual regression testing
  visual-regression:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Build application
        working-directory: ./frontend
        run: pnpm run build

      - name: Start application
        working-directory: ./frontend
        run: |
          pnpm run preview &
          sleep 10
        env:
          PORT: 4173

      - name: Run visual regression tests
        working-directory: ./frontend
        run: |
          # Create visual regression test
          cat > visual-regression.spec.js << 'EOF'
          const { test, expect } = require('@playwright/test');

          test.describe('Visual regression tests', () => {
            test('homepage screenshot', async ({ page }) => {
              await page.goto('http://localhost:4173');
              await page.waitForLoadState('networkidle');
              await expect(page).toHaveScreenshot('homepage.png');
            });

            test('brand analysis form screenshot', async ({ page }) => {
              await page.goto('http://localhost:4173');
              await page.fill('[data-testid="brand-url-input"]', 'https://example.com');
              await expect(page).toHaveScreenshot('form-filled.png');
            });
          });
          EOF
          
          npx playwright test visual-regression.spec.js

      - name: Store visual regression results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-regression-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30